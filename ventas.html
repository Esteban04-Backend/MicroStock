<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>MicroStock | Punto de Venta</title>

<link rel="stylesheet" href="styles.css">

<style>

.pos-container{
display:grid;
grid-template-columns:2fr 3fr 1.5fr;
gap:20px;
padding:20px;
}

.panel{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.product-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:15px;
}

.product-card{
background:#f4f6f8;
padding:15px;
border-radius:8px;
cursor:pointer;
text-align:center;
}

.product-card:hover{
background:#e3e8ee;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

button{
padding:10px;
cursor:pointer;
border:none;
background:#1976d2;
color:white;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.total-box{
font-size:28px;
font-weight:bold;
margin-top:20px;
}

.btn-finalizar{
width:100%;
padding:15px;
font-size:18px;
background:#2e7d32;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<h1>MicroStock</h1>
<p>Punto de Venta</p>

</header>

<nav>

<ul>

<li><a href="index.html">Dashboard</a></li>
<li><a href="productos.html">Productos</a></li>
<li><a href="categorias.html">Categorías</a></li>
<li><a href="proveedores.html">Proveedores</a></li>
<li><a href="clientes.html">Clientes</a></li>
<li><a href="ventas.html">Ventas</a></li>
<li><a href="compras.html">Compras</a></li>
<li><a href="inventario.html">Inventario</a></li>
<li><a href="movimientos_inventario.html">Movimientos</a></li>
<li><a href="alertas_stock.html">Alertas</a></li>
<li><a href="usuarios.html">Usuarios</a></li>

</ul>

</nav>

<div class="pos-container">


<!-- PANEL PRODUCTOS -->

<div class="panel">

<h2>Agregar producto</h2>

<label>Producto</label>

<select id="productoSeleccion">

<option value="">Seleccionar producto</option>

</select>

<label>Cantidad</label>

<input type="number" id="cantidad" value="1">

<button onclick="agregarDesdeSelector()">Agregar</button>


<h3>Acceso rápido</h3>

<input type="text" id="buscarProducto" placeholder="Buscar..." onkeyup="buscarProducto()">

<div id="listaProductos" class="product-grid"></div>

</div>


<!-- CARRITO -->

<div class="panel">

<h2>Carrito de venta</h2>

<table>

<thead>

<tr>

<th>Producto</th>
<th>Precio</th>
<th>Cantidad</th>
<th>Subtotal</th>

</tr>

</thead>

<tbody id="carrito"></tbody>

</table>

</div>


<!-- TOTAL -->

<div class="panel">

<h2>Resumen</h2>

<label>Cliente</label>

<select id="clienteVenta">

<option>Consumidor final</option>

</select>

<div class="total-box">

Total: $ <span id="total">0</span>

</div>

<button class="btn-finalizar" onclick="finalizarVenta()">

FINALIZAR VENTA

</button>

</div>

</div>


<script>

let carrito=[];
let productos=[];
let clientes = [];

async function cargarProductos(){

    const respuesta = await fetch("http://localhost:3000/productos");

    productos = await respuesta.json();
    const respuestaClientes =await fetch("http://localhost:3000/clientes");

    clientes =await respuestaClientes.json();

    let grid = document.getElementById("listaProductos");
    let selector = document.getElementById("productoSeleccion");
    let selectorCliente =document.getElementById("clienteVenta");

    grid.innerHTML = "";
    selector.innerHTML =
    "<option value=''>Seleccionar producto</option>";
    selectorCliente.innerHTML ="<option value=''>Seleccione un cliente</option>";

    productos.forEach((p,i)=>{

        selector.innerHTML += `
        <option value="${i}">
            ${p.nombre_producto}
        </option>
        `;

        let card = document.createElement("div");

        card.className = "product-card";

        card.innerHTML = `
        <strong>${p.nombre_producto}</strong>
        <br>
        $${p.precio_unitario}
        `;

        card.onclick = ()=>agregarCarrito(p,1);

        grid.appendChild(card);

    });
    clientes.forEach(c=>{

    selectorCliente.innerHTML += `
        <option value="${c.id_cliente}">
            ${c.nombre_cliente}
        </option>
    `;

    });

}

function agregarDesdeSelector(){

let index=document.getElementById("productoSeleccion").value
let cantidad=parseInt(document.getElementById("cantidad").value)

if(index===""){

alert("Seleccione producto")
return

}

let producto=productos[index]

agregarCarrito(producto,cantidad)

}

function agregarCarrito(producto,cantidad){

let item = carrito.find(
    p => p.id_producto === producto.id_producto
);

if(item){

item.cantidad+=cantidad

}else{

carrito.push({

id_producto: producto.id_producto,
nombre: producto.nombre_producto,
precio: Number(producto.precio_unitario),
cantidad: cantidad

})

}

actualizarCarrito()

}

function actualizarCarrito(){

let tabla=document.getElementById("carrito")
tabla.innerHTML=""

let total=0

carrito.forEach(p=>{

let subtotal=p.precio*p.cantidad
total+=subtotal

tabla.innerHTML+=`
<tr>
<td>${p.nombre}</td>
<td>${p.precio}</td>
<td>${p.cantidad}</td>
<td>${subtotal}</td>
</tr>
`

})

document.getElementById("total").innerText=total

}

async function finalizarVenta(){

    if(carrito.length==0){

        alert("Debe agregar productos");
        return;

    }

    const cliente = document
        .getElementById("clienteVenta")
        .value;

        if(cliente===""){

            alert("Seleccione un cliente");

            return;

        }

        const datos = {

            cliente:Number(cliente),
            usuario:1,
            productos:carrito

    };

    const respuesta = await fetch(

        "http://localhost:3000/ventas/completa",

        {

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify(datos)

        }

    );

    const resultado = await respuesta.json();

    if(respuesta.ok){

        alert(resultado.mensaje);

        carrito=[];

        actualizarCarrito();

        cargarProductos();

    }

    else{

        alert(resultado.error);

    }

}

function buscarProducto(){

let texto=document.getElementById("buscarProducto").value.toLowerCase()

let filtrados = productos.filter(p=>

p.nombre_producto
.toLowerCase()
.includes(texto)

)

let grid=document.getElementById("listaProductos")

grid.innerHTML=""

filtrados.forEach(p=>{

let card=document.createElement("div")
card.className="product-card"
card.innerHTML=`
<strong>${p.nombre_producto}</strong>
<br>
$${p.precio_unitario}
`
card.onclick=()=>agregarCarrito(p,1)

grid.appendChild(card)

})

}

cargarProductos()

</script>

</body>

</html>
